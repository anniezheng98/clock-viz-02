<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equation Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="clock-container">
    <div class="tiles-row">
      <div class="tile" id="tile-hour" aria-label="Hour">
        <span class="tile-text" id="text-hour">0</span>
      </div>
      <div class="tile" id="tile-minute" aria-label="Minute">
        <span class="tile-text" id="text-minute">0</span>
      </div>
      <div class="tile" id="tile-second" aria-label="Second">
        <span class="tile-text" id="text-second">0</span>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
